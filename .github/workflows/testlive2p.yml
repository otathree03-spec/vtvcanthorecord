name: Live M3U8 to YouTube (Auto 1080p - 2 min)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  live:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt update && sudo apt install -y ffmpeg

      - name: Auto select best stream + Live YouTube
        run: |
          URL="https://live.fptplay53.net/live/media/VTV_can_tho/live_hls_avc/index.m3u8"
          KEY="py7u-ewjm-36b0-auuj-51ea"

          echo "🔍 Tìm stream chất lượng cao nhất..."

          BEST_URL=$(ffmpeg -i "$URL" 2>&1 | \
          grep -oE 'https://[^ ]+\.m3u8' | \
          sort -u | \
          while read line; do
            bitrate=$(echo "$line" | grep -oE '[0-9]{6,}' | head -n1)
            echo "$bitrate $line"
          done | sort -nr | head -n1 | cut -d' ' -f2)

          echo "✅ Stream chọn:"
          echo "$BEST_URL"

          echo "🚀 Bắt đầu live YouTube (2 phút)..."

          ffmpeg -re -loglevel warning \
          -reconnect 1 -reconnect_streamed 1 -reconnect_delay_max 5 \
          -i "$BEST_URL" \
          -map 0:v -map 0:a? \
          -c:v libx264 -preset veryfast -pix_fmt yuv420p \
          -b:v 4500k -maxrate 4500k -bufsize 9000k \
          -g 50 -r 25 \
          -c:a aac -b:a 128k \
          -f flv "rtmp://a.rtmp.youtube.com/live2/$KEY" \
          -t 120
