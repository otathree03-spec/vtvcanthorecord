name: Live YouTube 2 Minutes

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  live:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt update && sudo apt install -y ffmpeg

      - name: Live YouTube
        run: |
          ffmpeg -re -loglevel warning \
          -reconnect 1 -reconnect_streamed 1 -reconnect_delay_max 5 \
          -i "https://live.fptplay53.net/live/media/VTV_can_tho/live_hls_avc/index.m3u8" \
          -map 0:v -map 0:a? \
          -c:v libx264 -preset veryfast -pix_fmt yuv420p \
          -b:v 4500k -maxrate 4500k -bufsize 9000k \
          -g 50 -r 25 \
          -c:a aac -b:a 128k \
          -f flv "rtmp://a.rtmp.youtube.com/live2/py7u-ewjm-36b0-auuj-51ea" \
          -t 100 \
          -flush_packets 1 \
          -shortest
